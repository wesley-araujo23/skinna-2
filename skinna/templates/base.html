<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block titulo %}SkinnaBar{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">

        <a class="navbar-brand" href="{{ url_for('home') }}">
            <img src="{{ url_for('static', filename='img/logo.png') }}" class="logo">
            SkinnaBar
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('home') }}">Início</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('cardapio') }}">Cardápio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('programacao') }}">Programação</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('promocoes') }}">Promoções</a>
                </li>
            </ul>

        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block conteudo %}{% endblock %}
</div>

<footer class="footer">
    <p>SkinnaBar • Chopp • Música • Experiência</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
