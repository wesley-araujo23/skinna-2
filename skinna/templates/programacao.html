{% extends 'base.html' %}

{% block titulo %}
Programação
{% endblock %}

{% block conteudo %}

<h1 class="text-center text-glow">Programação da Semana</h1>

{% if eventos %}

{% for evento in eventos %}

<div class="card card-custom p-4 mt-3">

<h4>{{ evento.dia }}</h4>

<p>{{ evento.evento }}</p>

</div>

{% endfor %}

{% else %}

<p class="text-center mt-4">
Nenhum evento cadastrado ainda.
</p>

{% endif %}

{% endblock %}
